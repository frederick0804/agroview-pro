<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta property="og:title" content="Agroworkin" />

  </head>

  <body>
    <!-- Anti-flash: aplica darkMode y colores ANTES de que React cargue -->
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem("agroview-theme") || "{}");
          if (t.darkMode) document.documentElement.classList.add("dark");
          if (t.colorPrimario && /^#[0-9a-fA-F]{6}$/.test(t.colorPrimario)) {
            function hslParts(hex) {
              var r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
              var max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2, h=0, s=0;
              if (max!==min) { var d=max-min; s=l>.5?d/(2-max-min):d/(max+min); if(max===r)h=((g-b)/d+(g<b?6:0))/6; else if(max===g)h=((b-r)/d+2)/6; else h=((r-g)/d+4)/6; }
              return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
            }
            function h2hsl(hex) { var p=hslParts(hex); return p.h+" "+p.s+"% "+p.l+"%"; }
            var lum=function(hex){var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;return .2126*r+.7152*g+.0722*b;};
            var root = document.documentElement;
            var dark = t.darkMode;
            // Primary
            var p = h2hsl(t.colorPrimario), pFg = lum(t.colorPrimario)>.4?"20 14% 4%":"0 0% 98%";
            root.style.setProperty("--primary", p);
            root.style.setProperty("--primary-foreground", pFg);
            root.style.setProperty("--ring", p);
            // Sidebar derived from primary hue
            var pp = hslParts(t.colorPrimario), h=pp.h, sS=Math.min(pp.s,45);
            if (dark) {
              root.style.setProperty("--sidebar-background", h+" "+Math.min(sS,25)+"% 6%");
              root.style.setProperty("--sidebar-accent", h+" 20% 14%");
              root.style.setProperty("--sidebar-border", h+" 15% 17%");
            } else {
              root.style.setProperty("--sidebar-background", h+" "+sS+"% 18%");
              root.style.setProperty("--sidebar-accent", h+" 35% 25%");
              root.style.setProperty("--sidebar-border", h+" 30% 25%");
            }
            root.style.setProperty("--sidebar-primary", p);
            root.style.setProperty("--sidebar-primary-foreground", pFg);
            // Accent
            if (t.colorAccent && /^#[0-9a-fA-F]{6}$/.test(t.colorAccent)) {
              var a = h2hsl(t.colorAccent), aFg = lum(t.colorAccent)>.4?"20 14% 4%":"0 0% 98%";
              root.style.setProperty("--accent", a);
              root.style.setProperty("--accent-foreground", aFg);
            }
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
